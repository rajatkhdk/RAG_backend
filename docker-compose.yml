services:

  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

